name: Nova restore drill

# R1.8 — restore drill for the off-platform backup.
# "If it doesn't restore, the backup doesn't exist."
# Step 3: download the latest pg_dump from Backblaze B2 onto the runner.
# pg_restore and verification are added in later steps.

on:
  workflow_dispatch: {}

jobs:
  restore-drill:
    runs-on: ubuntu-latest

    services:
      scratch-postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Install PostgreSQL 18 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Confirm scratch Postgres is up and pgvector is available
        env:
          PGPASSWORD: postgres
        run: |
          export PATH=/usr/lib/postgresql/18/bin:$PATH
          psql --version
          echo "=== version ==="
          psql -h localhost -U postgres -d nova_restore -c "SELECT version();"
          echo "=== pgvector availability ==="
          psql -h localhost -U postgres -d nova_restore -c "SELECT name, default_version FROM pg_available_extensions WHERE name = 'vector';"

      - name: Download latest dump from Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
        run: |
          mkdir -p restore-input
          echo "=== bucket contents (.dump files) ==="
          aws s3 ls "s3://${B2_BUCKET}/" --endpoint-url "https://${B2_ENDPOINT}" | grep -E 'nova-db-.*\.dump$' | sort
          LATEST=$(aws s3 ls "s3://${B2_BUCKET}/" --endpoint-url "https://${B2_ENDPOINT}" \
            | grep -E 'nova-db-.*\.dump$' \
            | sort \
            | tail -n 1 \
            | awk '{print $NF}')
          if [ -z "$LATEST" ]; then
            echo "ERROR: no nova-db-*.dump found in bucket"
            exit 1
          fi
          echo "=== selected dump ==="
          echo "Restoring from: $LATEST"
          aws s3 cp "s3://${B2_BUCKET}/${LATEST}" "restore-input/${LATEST}" \
            --endpoint-url "https://${B2_ENDPOINT}"
          echo "=== local file ==="
          ls -lh "restore-input/${LATEST}"
          echo "${LATEST}" > restore-input/.selected-dump-name
