name: Nova restore drill

# R1.8 — restore drill for the off-platform backup.
# "If it doesn't restore, the backup doesn't exist."
# Step 5: verify the restored scratch DB has the right shape and contents.
# Three checks: table count >= 50; eight key tables have rows; one sample
# row from tony_facts reads as parseable JSON.

on:
  workflow_dispatch: {}

jobs:
  restore-drill:
    runs-on: ubuntu-latest

    services:
      scratch-postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Install PostgreSQL 18 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Confirm scratch Postgres is up and pgvector is available
        env:
          PGPASSWORD: postgres
        run: |
          export PATH=/usr/lib/postgresql/18/bin:$PATH
          psql --version
          echo "=== version ==="
          psql -h localhost -U postgres -d nova_restore -c "SELECT version();"
          echo "=== pgvector availability ==="
          psql -h localhost -U postgres -d nova_restore -c "SELECT name, default_version FROM pg_available_extensions WHERE name = 'vector';"

      - name: Download latest dump from Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
        run: |
          mkdir -p restore-input
          echo "=== bucket contents (.dump files) ==="
          aws s3 ls "s3://${B2_BUCKET}/" --endpoint-url "https://${B2_ENDPOINT}" | grep -E 'nova-db-.*\.dump$' | sort
          LATEST=$(aws s3 ls "s3://${B2_BUCKET}/" --endpoint-url "https://${B2_ENDPOINT}" \
            | grep -E 'nova-db-.*\.dump$' \
            | sort \
            | tail -n 1 \
            | awk '{print $NF}')
          if [ -z "$LATEST" ]; then
            echo "ERROR: no nova-db-*.dump found in bucket"
            exit 1
          fi
          echo "=== selected dump ==="
          echo "Restoring from: $LATEST"
          aws s3 cp "s3://${B2_BUCKET}/${LATEST}" "restore-input/${LATEST}" \
            --endpoint-url "https://${B2_ENDPOINT}"
          echo "=== local file ==="
          ls -lh "restore-input/${LATEST}"
          echo "${LATEST}" > restore-input/.selected-dump-name

      - name: Restore dump into scratch Postgres
        env:
          PGPASSWORD: postgres
        run: |
          export PATH=/usr/lib/postgresql/18/bin:$PATH
          pg_restore --version
          DUMP_NAME=$(cat restore-input/.selected-dump-name)
          echo "=== restoring: $DUMP_NAME ==="
          pg_restore \
            --host=localhost \
            --port=5432 \
            --username=postgres \
            --dbname=nova_restore \
            --no-owner \
            --no-privileges \
            --exit-on-error \
            --verbose \
            "restore-input/${DUMP_NAME}" 2>&1 | tail -n 100
          echo "=== restore complete ==="
          echo "=== scratch DB table count ==="
          psql -h localhost -U postgres -d nova_restore -t -c "SELECT count(*) FROM pg_tables WHERE schemaname = 'public';"

      - name: Verify restored database
        env:
          PGPASSWORD: postgres
        run: |
          export PATH=/usr/lib/postgresql/18/bin:$PATH
          PSQL="psql -h localhost -U postgres -d nova_restore -t -A"
          FAIL=0

          echo "=== check 1: table count >= 50 ==="
          TABLE_COUNT=$($PSQL -c "SELECT count(*) FROM pg_tables WHERE schemaname = 'public';")
          echo "tables in public schema: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 50 ]; then
            echo "FAIL: only $TABLE_COUNT tables restored, expected >= 50"
            FAIL=1
          else
            echo "PASS: $TABLE_COUNT tables present"
          fi

          echo ""
          echo "=== check 2: key tables have rows ==="
          # These are the irreplaceable, accumulated-self tables.
          # Names match the LIVE schema (from R1.7's JSONL export log),
          # not the source-code CREATE TABLE statements.
          KEY_TABLES="tony_run_ledger memories semantic_memories tony_facts tony_journal tony_diary_entries tony_behaviour_rules tony_corrections"
          for T in $KEY_TABLES; do
            EXISTS=$($PSQL -c "SELECT 1 FROM pg_tables WHERE schemaname='public' AND tablename='$T';")
            if [ -z "$EXISTS" ]; then
              echo "  $T: TABLE MISSING"
              FAIL=1
              continue
            fi
            ROWS=$($PSQL -c "SELECT count(*) FROM \"$T\";")
            echo "  $T: $ROWS rows"
            if [ "$ROWS" -lt 1 ]; then
              echo "    FAIL: $T is empty, expected at least 1 row"
              FAIL=1
            fi
          done

          echo ""
          echo "=== check 3: sample row from tony_facts parses as JSON ==="
          SAMPLE=$($PSQL -c "SELECT row_to_json(t) FROM tony_facts t LIMIT 1;")
          if [ -z "$SAMPLE" ]; then
            echo "FAIL: could not read a sample row from tony_facts"
            FAIL=1
          else
            echo "$SAMPLE" | python3 -c "import sys, json; json.loads(sys.stdin.read()); print('PASS: sample row is valid JSON')" || {
              echo "FAIL: sample row from tony_facts is not parseable JSON"
              FAIL=1
            }
          fi

          echo ""
          if [ "$FAIL" -eq 0 ]; then
            echo "=== RESTORE DRILL PASSED ==="
            echo "Backup is provably restorable."
          else
            echo "=== RESTORE DRILL FAILED ==="
            exit 1
          fi
