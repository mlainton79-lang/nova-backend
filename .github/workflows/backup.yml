name: Nova database backup

# R1.7 — off-platform backup to Backblaze B2.
# Step 5: pg_dump + per-table JSONL exports, all uploaded to Backblaze B2.
# Credential-bearing tables are excluded from the plaintext JSONL exports
# (they remain captured inside the encrypted pg_dump).

on:
  schedule:
    # 03:17 UTC daily — odd minute to avoid the top-of-hour load spike on GitHub's runners.
    - cron: '17 3 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 18 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Dump database
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          export PATH=/usr/lib/postgresql/18/bin:$PATH
          pg_dump --version
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          mkdir -p backup-output
          pg_dump -Fc "$DATABASE_PUBLIC_URL" -f "backup-output/nova-db-${STAMP}.dump"
          ls -lh backup-output

      - name: Export critical tables as JSONL
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          export PATH=/usr/lib/postgresql/18/bin:$PATH
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          mkdir -p backup-output/jsonl-${STAMP}
          # Tables excluded from plaintext JSONL — they hold credentials/tokens.
          # Still captured inside the pg_dump above; not safe as readable JSONL.
          EXCLUDE="tony_banking_tokens gmail_accounts push_tokens tony_config"
          TABLES=$(psql "$DATABASE_PUBLIC_URL" -At -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename")
          for T in $TABLES; do
            if echo "$EXCLUDE" | grep -qw "$T"; then
              echo "skip (sensitive): $T"
              continue
            fi
            psql "$DATABASE_PUBLIC_URL" -At \
              -c "SELECT row_to_json(t) FROM \"$T\" t" \
              > "backup-output/jsonl-${STAMP}/${T}.jsonl"
            echo "exported: $T ($(wc -l < backup-output/jsonl-${STAMP}/${T}.jsonl) rows)"
          done
          ls -lh backup-output/jsonl-${STAMP}

      - name: Upload backup to Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
        run: |
          aws s3 cp backup-output/ "s3://${B2_BUCKET}/" \
            --recursive \
            --endpoint-url "https://${B2_ENDPOINT}"
          echo "Upload complete. Listing bucket:"
          aws s3 ls "s3://${B2_BUCKET}/" --recursive --endpoint-url "https://${B2_ENDPOINT}"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v7
        with:
          name: nova-db-backup
          path: backup-output/
          retention-days: 7
