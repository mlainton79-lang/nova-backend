name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  compile:
    name: Compile Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Compile application modules
        run: python -m compileall -q app think_worker.py vinted_worker

      - name: Run local unit tests
        run: python tools/run_unit_tests.py
